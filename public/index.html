<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Influência</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="hud-container">
        <div class="hud-header">
            <h2>RADAR DE INFLUÊNCIA</h2>
            <div class="botoes-acao">
                <button id="btn-limpar">Limpar Dados</button>
                <button id="btn-votar">Nova Conexão</button>
            </div>
        </div>
        
        <div class="hud-body">
            <h3>Métricas do Ecossistema</h3>
            <div class="metricas-grid">
                <div class="metrica-card">
                    <span class="metrica-titulo">Densidade</span>
                    <span class="metrica-valor" id="metrica-densidade">0%</span>
                </div>
                <div class="metrica-card">
                    <span class="metrica-titulo">Confiança</span>
                    <span class="metrica-valor" id="metrica-mutuas">0</span>
                </div>
                <div class="metrica-card">
                    <span class="metrica-titulo">Ocultos</span>
                    <span class="metrica-valor" id="metrica-ocultos">0</span>
                </div>
            </div>
            
            <h3 style="margin-top: 25px;">Top Influenciadores</h3>
            <ul id="lista-ranking">
                <li class="aguardando">Aguardando telemetria...</li>
            </ul>
        </div>
    </div>
    
    <svg id="mapa-svg"></svg>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/graph.js"></script>
    <script src="js/algorithms.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
